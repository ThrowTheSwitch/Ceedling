# Internal composite action — not intended to be triggered directly.
# Called after OS-specific tool installation in the tests-linux and tests-windows jobs in ci.yml.
#
# Note: Composite actions require an explicit `shell:` on every `run:` step — there is no
# default shell. Steps using `uses:` (action calls) do not need `shell:`.

name: 'Run Ceedling Test Suite'
description: 'Download docs artifact, run rake ci, handle failure artifacts, clean systests, build and install Ceedling gem'

inputs:
  ruby:
    description: 'Ruby version (used in failure artifact name)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Run All Self Tests
      shell: bash
      env:
        CI_RSPEC_PROGRESS_FORMAT: true
      run: rake ci

    # Remove passing system test artifacts before upload so the artifact contains only failure data
    - name: Remove passing system test artifacts before upload
      if: failure()
      shell: bash
      run: |
        rm -rf systests/proj/pass
        rm -f systests/systest.pass.*.log

    # Upload system test failure logs and temp project directories on test job failure
    - name: Upload system test failure artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: systest-failures-${{ runner.os }}-ruby-${{ inputs.ruby }}
        path: systests/
        if-no-files-found: ignore
