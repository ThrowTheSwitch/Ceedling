# Internal composite action — not intended to be triggered directly.
# Called after run-system-tests in the tests-linux, tests-windows, and tests-macos jobs in ci.yml.
#
# Note: Composite actions require an explicit `shell:` on every `run:` step — there is no
# default shell. Steps using `uses:` (action calls) do not need `shell:`.

name: 'Run Plugin Tests'
description: 'Run FFF, module_generator, and dependencies plugin test suites (requires installed Ceedling gem)'

runs:
  using: "composite"
  steps:
    # Remove any systest results before building the gem
    # This prevents breaking the gem build with super long filenames
    - name: Remove any system test results before gem build
      shell: bash
      run: rm -rf systests/

    # Build & Install Ceedling Gem
    # Plugin test suites require the installed gem
    # Skip RDoc generation to speed up the build and remove language parsing failures
    - name: Build and install Ceedling gem
      shell: bash
      run: |
        gem build ceedling.gemspec
        gem install --local ceedling-*.gem --no-document

    - name: "Run tests on Ceedling plugin: FFF"
      shell: bash
      run: |
        cd plugins/fff
        rake
        cd ../..

    - name: "Run tests on Ceedling plugin: Module Generator"
      shell: bash
      run: |
        cd plugins/module_generator
        rake
        cd ../..

    - name: "Run tests on Ceedling plugin: Dependencies"
      shell: bash
      run: |
        cd plugins/dependencies
        rake
        cd ../..
