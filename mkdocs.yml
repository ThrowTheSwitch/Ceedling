# Site metadata
site_name: Ceedling
site_description: Test-Centered Build System for C
site_url: https://throwtheswitch.github.io/Ceedling/
repo_url: https://github.com/ThrowTheSwitch/Ceedling
repo_name: ThrowTheSwitch/Ceedling

# Footer copyright notice
copyright: >-
  &copy; 2010-2026 M. Karlesky, M. VanderVoord, and G. Williams &mdash;
  Documentation licensed
  <a href="https://creativecommons.org/licenses/by-sa/4.0/deed.en">Creative Commons 4.0 Attribution Share-Alike</a>

# Material theme configuration
theme:
  name: material
  palette:
    - scheme: default
      primary: green
  toc_depth: 2
  features:
    - navigation.tabs        # Top-level nav rendered as tabs
    - navigation.sections    # Sections rendered as groups in left sidebar
    - navigation.top         # Back-to-top button
    - navigation.indexes     # Section index pages (first item in section = section landing page)
    - navigation.path        # Breadcrumb trail below page title
    - search.suggest         # Autocomplete suggestions in search
    - search.highlight       # Highlight search terms on result pages
    - content.code.copy      # Copy button on code blocks
    - content.code.annotate  # Inline annotation support in code blocks

# Extra site configuration
extra:
  generator: false  # Suppress "Made with Material for MkDocs" footer text
  version:
    provider: mike  # Versioned documentation deployment via mike
    default: latest

# Plugins
plugins:
  - search  # Full-text search index
  - mike:   # Versioned documentation deployment to gh-pages
      alias_type: symlink
      canonical_version: latest

# Markdown extensions
markdown_extensions:
  - admonition          # !!! note / tip / warning / etc. callout blocks
  - md_in_html          # Markdown inside raw HTML elements (required for card grids)
  - pymdownx.emoji:     # Emoji shortcodes (:material-icon:, :fontawesome-icon:, etc.)
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight: # Syntax highlighting for fenced code blocks via Pygments
      use_pygments: true
      anchor_linenums: true
  - pymdownx.superfences  # Fenced code blocks inside admonitions and other nested elements
  - pymdownx.inlinehilite # Inline code syntax highlighting with `#!lang code` syntax

# Files in docs/ excluded from the generated site.
# These are standalone reference documents, developer files, PDFs, or historical records
# maintained separately from the versioned documentation bundle.
exclude_docs: |
  snapshot.yml
  CeedlingPacket.md
  CeedlingUpgrade.md
  ReleaseNotes.md
  BreakingChanges.md
  Changelog.md
  CONTRIBUTING.md
  CODE_OF_CONDUCT.md
  SECURITY.md
  ThrowTheSwitchCodingStandard.md
  CeedlingPullRequestChecklist.md
  Ceedling Basic Porting.pdf
  Ceedling Managing Release Code.pdf
  Ceedling Working with IDEs.pdf

# Site navigation tree
nav:
  - Home: index.md                  # Landing page / annotated table of contents
  - Overview: overview.md           # Background, definitions, and framework links
  - Getting Started:
    - Quick Start: quick-start.md           # Installation through first build, all in one place
    - Installation: installation.md         # Prerequisites and install steps
    - Command Line: command-line.md         # Ceedling's command line reference
  - Testing Guide:
    - Tests & Test Suites: test-guide.md              # Test case anatomy and suite structure
    - Conventions & Behaviors: conventions.md         # File/path/name conventions and preprocessing
    - Unity, CMock & CException: frameworks.md        # Framework configuration and usage
    - Build Directive Macros: build-directives.md     # In-code macros for controlling builds
    - Partials: partials.md                           # Partial test file inclusion
  - Configuration:
    - configuration/index.md                  # Configuration section landing page
    - Loading Configuration: configuration-loading.md     # Base config, env vars, mixins
    - Project File Basics: configuration/project-file.md  # YAML conventions and special Ceedling handling
    - Which Ceedling: which-ceedling.md               # Pointing to a specific Ceedling install
    - Global Collections: global-collections.md       # Globally available Ruby path/file lists
    - Configuration Reference:
      - configuration/reference/index.md                               # Reference section landing page
      - Global Project Settings: configuration/reference/project.md   # :project — build root, threads, preprocessor, etc.
      - Mixins: configuration/reference/mixins.md                      # :mixins — merging additional configs
      - Test Build Settings: configuration/reference/test-build.md    # :test_build — assembly support for tests
      - Release Build Settings: configuration/reference/release-build.md  # :release_build — output, assembly, artifacts
      - Search Paths: configuration/reference/paths.md                # :paths — directory lists for all file collections
      - File Collections: configuration/reference/files.md            # :files — fine-grained file list tailoring
      - Environment Variables: configuration/reference/environment.md # :environment — shell env vars for tool runs
      - File Extensions: configuration/reference/extension.md         # :extension — source, header, object, etc.
      - Compilation Symbols: configuration/reference/defines.md       # :defines — -D symbols per context and test matcher
      - Libraries: configuration/reference/libraries.md               # :libraries — test, release, and system libraries
      - Compilation & Link Flags: configuration/reference/flags.md    # :flags — per-context and per-test flag matchers
      - CException: configuration/reference/cexception.md             # :cexception — CException compile-time config
      - CMock: configuration/reference/cmock.md                       # :cmock — CMock code generation and compilation
      - Unity: configuration/reference/unity.md                       # :unity — Unity compile-time config
      - Test Runner: configuration/reference/test-runner.md           # :test_runner — runner generation options
      - Tools: configuration/reference/tools.md                       # :tools — full tool definitions and shortcuts
      - Plugins: configuration/reference/plugins.md                   # :plugins — enabling and loading plugins
  - Plugins:
    - Overview: plugins/index.md                                              # Plugin directory and overview
    - FFF (Fake Functions): plugins/fff.md                                    # Fake Function Framework integration
    - GCov (Coverage): plugins/gcov.md                                        # GNU gcov code coverage
    - Bullseye (Coverage): plugins/bullseye.md                                # Bullseye commercial coverage tool
    - Command Hooks: plugins/command-hooks.md                                 # Hook scripts to build steps
    - Module Generator: plugins/module-generator.md                           # Scaffold source/test/mock file sets
    - Dependencies: plugins/dependencies.md                                   # External dependency fetching and building
    - Subprojects: plugins/subprojects.md                                     # Build libraries as sub-builds
    - Test Report Log Factory: plugins/report-tests-log-factory.md            # Configurable file-based report logging
    - Test Report — Pretty: plugins/report-tests-pretty-stdout.md             # Formatted stdout test results
    - Test Report — IDE: plugins/report-tests-ide-stdout.md                   # IDE-friendly stdout test results
    - Test Report — TeamCity: plugins/report-tests-teamcity-stdout.md         # TeamCity service messages
    - Test Report — GTest-like: plugins/report-tests-gtestlike-stdout.md      # Google Test-style output
    - Test Report — Raw Output: plugins/report-tests-raw-output-log.md        # Raw test output log files
    - Build Warnings Log: plugins/report-build-warnings-log.md                # Collect build warnings to file
    - Compile Commands JSON DB: plugins/compile-commands-json-db.md           # compile_commands.json for tooling
    - Beep: plugins/beep.md                                                   # Audible build completion notification
  - Releases:
    - History Documents: project/release-history.md  # Links to release notes, changelog, and breaking changes
    - Upgrading: project/upgrade.md                  # Upgrade guidance between major versions
  - Development:
    - Plugin Development Guide: development/plugin-development-guide.md  # Guide to building custom plugins
