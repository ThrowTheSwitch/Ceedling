---
:project:
  :name: "Cipher Quest"
  # Ceedling is used as a gem; version '?' accepts any installed version
  :which_ceedling: gem
  :ceedling_version: '?'

  # Release build is enabled — but requires a mixin to supply feature symbols
  :release_build: TRUE

  # No mocks needed — all test dependencies are real implementations
  :use_mocks: FALSE

  # No preprocessor needed — #ifdefs are handled naturally by test-specific defines
  :use_test_preprocessor: :none

  :build_root: build
  :test_file_prefix: Test
  :default_tasks:
    - test:all

  :test_threads: :auto
  :compile_threads: :auto

:release_build:
  :output: cipher_quest.out

# Mixins are optional configuration fragments merged into this project config.
# The mixin/ directory contains release build variants that supply the feature
# symbols required by the conditional compilation in main.c (see src/main.c).
# Without a mixin, `ceedling release` will fail with a descriptive #error.
#
# Usage (file-based mixin) from the command line:
#   ceedling release --mixin=mixin/release_rot13.yml
#   ceedling release --mixin=mixin/release_caesar.yml
#   ceedling release --mixin=mixin/release_full.yml
#
# Alternatives (see Mixin documentation):
#  1. Setting environment variable(s) that point to one or more mixin files.
#  2. Enabling a mixin inside the :mixins section below.
#  3. Use inline YAML at the command line (`ceedling release --mixin="defines: {release: ['CIPHER_ROT13']}"`)

# Option (2) above
# :mixins:
#   :load_paths:
#     - mixin
#   :enabled:
#     - release_full
#     # - release_rot13
#     # - release_caesar

:plugins:
  :load_paths: []
  :enabled:
    - module_generator
    - report_tests_pretty_stdout

:extension:
  :executable: .out

:paths:
  :test:
    - test/**
  :source:
    - src/**
  :include:
    - src/**
  :libraries: []

# Symbols for test builds use matchers to apply per-test-file defines.
# Each test file that exercises a conditionally compiled feature gets the
# symbol that enables that feature. The wildcard '*' applies TEST to all.
#
# Release builds intentionally have no defines here as this example 
# project is configured to use Mixins for release builds 
# (see :mixins above and the mixin/ directory).
# Without a mixin providing at least one feature symbol, `ceedling release`
# will fail at compilation of main.c with a clear #error message.
:defines:
  :test:
    '*':
      - TEST
    :TestCipherRot13:
      - CIPHER_ROT13
    :TestCipherCaesar:
      - CIPHER_CAESAR
    :TestAnalyzer:
      - ANALYZER_ENABLED
  :release: []

  :use_test_definition: FALSE

:flags:
  :test:
    :compile:
      '*':
        - '-std=c99'
  :release:
    :compile:
      - '-std=c99'
...
