# Release build mixin: Caesar cipher variant
#
# Enables the Caesar cipher feature for a release build. Merge into the
# project configuration using the --mixin flag:
#
#   ceedling release --mixin mixin/release_caesar.yml
#
# Or by simple mixin name (Ceedling searches mixin/ load paths):
#
#   ceedling release --mixin release_caesar
#
# Or supply the equivalent YAML directly using the = sigil
# (quote the value to protect YAML special characters from the shell):
#
#   ceedling release --mixin "=defines: {release: [CIPHER_CAESAR]}"

---
:defines:
  :release:
    - CIPHER_CAESAR
...
