---
:valgrind:
  # Register a build failure if valgrind reports memory errors in any test binary
  :fail_build: TRUE

  # Valgrind flags (do not include --log-file or the ${1} executable token)
  :arguments:
    - "--leak-check=full"
    - "--show-leak-kinds=all"
    - "--track-origins=yes"
    - "--errors-for-leak-kinds=all"
...
