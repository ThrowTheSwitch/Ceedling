---
:valgrind:
  # Halt the build if valgrind reports memory errors in any test binary
  :halt_on_error: FALSE

  # Valgrind flags (do not include --log-file or the ${1} executable token)
  :arguments:
    - "--leak-check=full"
    - "--show-leak-kinds=all"
    - "--track-origins=yes"
    - "--errors-for-leak-kinds=all"
...
